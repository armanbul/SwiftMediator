name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Setup .NET 8 (multi-targeting)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore SwiftMediator.slnx

    - name: Build
      run: dotnet build SwiftMediator.slnx -c Release --no-restore

    - name: Test
      run: dotnet test SwiftMediator.slnx -c Release --no-build --verbosity normal

    - name: Pack
      run: |
        dotnet pack SwiftMediator.Core -c Release --no-build --output ./artifacts
        dotnet pack SwiftMediator.Contracts -c Release --no-build --output ./artifacts

    - name: Upload NuGet artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: |
          ./artifacts/*.nupkg
          ./artifacts/*.snupkg
        retention-days: 7
