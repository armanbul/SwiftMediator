name: Publish to NuGet

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet package version (e.g. 2026.4.2)'
        required: true
        default: '2026.4.2'

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Setup .NET 8 (multi-targeting)
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extract version from tag or input
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.version }}"
        } else {
          $version = "${{ github.ref_name }}".TrimStart('v')
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Restore
      run: dotnet restore SwiftMediator.slnx

    - name: Build
      run: dotnet build SwiftMediator.slnx -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}

    - name: Test
      run: dotnet test SwiftMediator.slnx -c Release --no-build --verbosity normal

    - name: Pack
      run: |
        dotnet pack SwiftMediator.Core -c Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.VERSION }}
        dotnet pack SwiftMediator.Contracts -c Release --no-build --output ./artifacts -p:Version=${{ steps.version.outputs.VERSION }}

    - name: Push to NuGet.org
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./artifacts/*.nupkg
        generate_release_notes: true
